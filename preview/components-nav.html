<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid #E5E4DF;background:rgba(250,250,247,0.85);backdrop-filter:blur(12px)}
.brand{display:flex;align-items:center;gap:10px;font-weight:500;letter-spacing:-0.01em;font-size:15px}
.brand .dot{width:6px;height:6px;border-radius:50%;background:#FF4500}
.nav{display:flex;gap:28px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.04em;text-transform:uppercase;color:var(--fg-2)}
.nav .active{color:#0A0A0A;border-bottom:1px solid #0A0A0A;padding-bottom:2px}
.cta{font-family:var(--font-sans);font-size:13px;font-weight:500;color:#fff;background:#0A0A0A;padding:8px 14px;border-radius:4px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-top:14px;padding:0 24px}
</style></head><body style="padding:0">
<div class="card">
  <div class="bar">
    <div class="brand">МС<span class="dot"></span><span style="color:var(--fg-3);font-weight:400">/ Скворцов</span></div>
    <div class="nav">
      <span class="active">Работы</span>
      <span>Резюме</span>
      <span>Контакты</span>
    </div>
    <div class="cta">Связаться</div>
  </div>
  <div class="lbl">— STICKY HEADER · 56h · BLUR 12 · BG 85%</div>
</div>
</body></html>
