<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.case{display:grid;grid-template-columns:24px 1fr;gap:8px;max-width:560px}
.case::before{content:"1";font-size:17px;color:#888;font-variant-numeric:tabular-nums;padding-top:1px}
.title{font-size:17px;font-weight:500;letter-spacing:-0.005em;line-height:1.4;display:block;margin-bottom:6px;text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:1px;text-decoration-color:#CCCCC8}
.blurb{font-size:15px;color:#888;line-height:1.55;letter-spacing:-0.003em;margin-bottom:10px}
.metrics{display:flex;gap:16px;font-family:var(--font-mono);font-size:11px;color:#0A0A0A;text-transform:uppercase;letter-spacing:0.06em}
.metrics b{color:#FF4500;font-weight:500}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-top:24px}
</style></head><body>
<div class="card case">
  <div>
    <a href="#" class="title">Редизайн HRM-платформы НОТА Юнион</a>
    <div class="blurb">Полный редизайн на базе новой дизайн-системы. Внедрил Storybook с актуальной библиотекой компонентов из Figma — убрал энтропию между дизайном и разработкой.</div>
    <div class="metrics"><span><b>+42%</b> скорость задач</span><span><b>+68</b> NPS</span></div>
    <div class="lbl">— ИНЛАЙН-КЕЙС НА ЛЕНДИНГЕ · НОМЕР · ССЫЛКА · ОПИСАНИЕ · МЕТРИКИ</div>
  </div>
</div>
</body></html>
