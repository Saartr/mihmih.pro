<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.field{display:flex;flex-direction:column;gap:6px;flex:1}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em}
input,textarea{font-family:var(--font-sans);font-size:15px;border:none;border-bottom:1px solid #1A1A1A;background:transparent;padding:8px 0;outline:none;color:#0A0A0A}
input::placeholder{color:#9A9A97}
.focus{border-bottom-color:#FF4500}
</style></head><body>
<div class="card row gap-6">
  <div class="field">
    <div class="lbl">Имя</div>
    <input value="Михаил Скворцов">
  </div>
  <div class="field">
    <div class="lbl">Email</div>
    <input class="focus" placeholder="you@company.com">
  </div>
  <div class="field">
    <div class="lbl" style="color:#FF4500">Сообщение · фокус</div>
    <input class="focus" placeholder="О чём проект?">
  </div>
</div>
</body></html>
