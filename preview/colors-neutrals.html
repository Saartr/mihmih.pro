<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.sw{display:flex;flex-direction:column;gap:8px;flex:1}
.chip{height:64px;border:1px solid var(--line);display:flex;align-items:flex-end;padding:8px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em}
.hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-2)}
</style></head><body>
<div class="card row gap-3">
  <div class="sw"><div class="chip" style="background:#FAFAF7"></div><div class="lbl">bg</div><div class="hex">#FAFAF7</div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="lbl">elevated</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#F2F1ED"></div><div class="lbl">sunken</div><div class="hex">#F2F1ED</div></div>
  <div class="sw"><div class="chip" style="background:#E5E4DF"></div><div class="lbl">line</div><div class="hex">#E5E4DF</div></div>
  <div class="sw"><div class="chip" style="background:#CCCCC8"></div><div class="lbl">fg-5</div><div class="hex">#CCCCC8</div></div>
  <div class="sw"><div class="chip" style="background:#9A9A97"></div><div class="lbl">fg-4</div><div class="hex">#9A9A97</div></div>
  <div class="sw"><div class="chip" style="background:#666666"></div><div class="lbl">fg-3</div><div class="hex">#666666</div></div>
  <div class="sw"><div class="chip" style="background:#3A3A3A"></div><div class="lbl">fg-2</div><div class="hex">#3A3A3A</div></div>
  <div class="sw"><div class="chip" style="background:#0A0A0A"></div><div class="lbl">fg</div><div class="hex">#0A0A0A</div></div>
</div>
</body></html>
