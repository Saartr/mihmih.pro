<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.btn{font-family:var(--font-sans);font-size:14px;font-weight:500;padding:10px 18px;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:-0.005em}
.btn-primary{background:#0A0A0A;color:#FAFAF7}
.btn-accent{background:#FF4500;color:#fff}
.btn-secondary{background:transparent;color:#0A0A0A;border-color:#1A1A1A}
.btn-ghost{background:transparent;color:#0A0A0A}
.btn-ghost:hover{text-decoration:underline;text-underline-offset:4px}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-top:8px}
.col-i{display:flex;flex-direction:column;align-items:flex-start}
</style></head><body>
<div class="card row gap-5 center">
  <div class="col-i"><button class="btn btn-primary">Связаться</button><div class="lbl">primary</div></div>
  <div class="col-i"><button class="btn btn-accent">Скачать CV →</button><div class="lbl">accent · штучно</div></div>
  <div class="col-i"><button class="btn btn-secondary">Все проекты</button><div class="lbl">secondary</div></div>
  <div class="col-i"><button class="btn btn-ghost">Читать дальше →</button><div class="lbl">ghost / link</div></div>
</div>
</body></html>
