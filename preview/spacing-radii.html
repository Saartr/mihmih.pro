<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.r{width:64px;height:64px;background:#0A0A0A;display:flex;align-items:flex-end;padding:6px;color:#fff;font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em}
.col-i{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em}
</style></head><body>
<div class="card col gap-5">
  <div class="row gap-5">
    <div class="col-i"><div class="r" style="border-radius:0">0</div><div class="lbl">r-0 · поверхности</div></div>
    <div class="col-i"><div class="r" style="border-radius:2px">2</div><div class="lbl">r-1 · бейджи</div></div>
    <div class="col-i"><div class="r" style="border-radius:4px">4</div><div class="lbl">r-2 · кнопки, инпуты</div></div>
    <div class="col-i"><div class="r" style="border-radius:8px">8</div><div class="lbl">r-3 · модалки</div></div>
    <div class="col-i"><div class="r" style="border-radius:999px">∞</div><div class="lbl">r-pill · теги</div></div>
  </div>
</div>
</body></html>
