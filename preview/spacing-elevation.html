<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.tile{width:160px;height:96px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:0.08em}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-top:8px}
.col-i{display:flex;flex-direction:column}
</style></head><body>
<div class="card row gap-6">
  <div class="col-i"><div class="tile" style="border:1px solid #E5E4DF">FLAT (default)</div><div class="lbl">— по умолчанию плоско</div></div>
  <div class="col-i"><div class="tile" style="box-shadow:0 1px 0 rgba(10,10,10,0.06);border:1px solid #E5E4DF">SHADOW-1</div><div class="lbl">hairline · 0 1px 0 / 6%</div></div>
  <div class="col-i"><div class="tile" style="box-shadow:0 1px 2px rgba(10,10,10,0.06),0 4px 12px rgba(10,10,10,0.04)">SHADOW-2</div><div class="lbl">floating · 1 на экран</div></div>
</div>
</body></html>
