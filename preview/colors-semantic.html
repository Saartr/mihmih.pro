<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.sw{flex:1;display:flex;flex-direction:column;gap:6px}
.chip{height:64px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-size:12px;letter-spacing:0.08em}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
</style></head><body>
<div class="card row gap-3">
  <div class="sw"><div class="chip" style="background:#1E8449">SUCCESS</div><div class="lbl">#1E8449 — onboarded, saved</div></div>
  <div class="sw"><div class="chip" style="background:#B45309">WARNING</div><div class="lbl">#B45309 — outdated, review</div></div>
  <div class="sw"><div class="chip" style="background:#B91C1C">DANGER</div><div class="lbl">#B91C1C — delete, error</div></div>
</div>
</body></html>
