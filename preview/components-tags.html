<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.tag{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;border:1px solid #E5E4DF;color:#3A3A3A}
.tag.solid{background:#0A0A0A;color:#FAFAF7;border-color:#0A0A0A}
.tag.accent{background:#FFEDE5;color:#FF4500;border-color:#FFEDE5}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#1E8449;margin-right:6px;vertical-align:1px}
.meta{font-family:var(--font-mono);font-size:12px;color:var(--fg-3)}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em}
</style></head><body>
<div class="card col gap-4">
  <div class="row gap-2 center">
    <span class="tag">B2B</span>
    <span class="tag">Дизайн-система</span>
    <span class="tag solid">HRM</span>
    <span class="tag accent">— 2023</span>
    <span class="tag"><span class="dot"></span>Доступен</span>
  </div>
  <div class="meta">2022 — 2023 &nbsp;·&nbsp; Иннотех &nbsp;·&nbsp; НОТА Юнион &nbsp;·&nbsp; Lead Designer</div>
  <div class="lbl">— TAGS · STATUS DOT · META BAR</div>
</div>
</body></html>
